# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
---
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/scripts"
    schedule:
      interval: "monthly"
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "monthly"
  - package-ecosystem: "helm"
    directory: "/src/gateway-api-crds"
    schedule:
      interval: "monthly"
  - package-ecosystem: "helm"
    directory: "/src/gitlab-runners"
    schedule:
      interval: "monthly"
  - package-ecosystem: "helm"
    directory: "/src/jaeger-stack"
    schedule:
      interval: "monthly"
  - package-ecosystem: "helm"
    directory: "/src/k8s-haproxy"
    schedule:
      interval: "monthly"
  - package-ecosystem: "helm"
    directory: "/src/kibana"
    schedule:
      interval: "monthly"
  - package-ecosystem: "helm"
    directory: "/src/promoperators"
    schedule:
      interval: "monthly"
  - package-ecosystem: "helm"
    directory: "/src/terraform-operator-crds"
    schedule:
      interval: "monthly"
  - package-ecosystem: "helm"
    directory: "/src/universal-template"
    schedule:
      interval: "monthly"
  - package-ecosystem: "helm"
    directory: "/src/wireguard-operator"
    schedule:
      interval: "monthly"
  - package-ecosystem: "helm"
    directory: "/src/wireguard-operator-crds"
    schedule:
      interval: "monthly"